name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Let the deploy job publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; cancel superseded runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      # Rust + the wasm target to build boon-wasm. src/wasm/pkg is gitignored,
      # so it has to be built here (not committed).
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: wasm

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build WASM (-> src/wasm/pkg)
        run: bun run wasm

      # Custom domain (deadlock.nyc) serves from the root, so Vite's default
      # base of "/" is correct — no override needed. public/CNAME is copied into
      # dist/ and tells Pages the domain on every deploy.
      - name: Build site
        run: bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
